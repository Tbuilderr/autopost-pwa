<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AutoPost">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>AutoPost</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a; color: #e8e8e8;
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: calc(env(safe-area-inset-top, 20px) + 20px) 20px calc(env(safe-area-inset-bottom, 20px) + 20px);
      -webkit-font-smoothing: antialiased;
      transition: justify-content 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.has-posts { justify-content: flex-start; padding-top: calc(env(safe-area-inset-top, 20px) + 48px); }

    .header { text-align: center; margin-bottom: 32px; }
    .header h1 {
      font-size: 32px; font-weight: 600; letter-spacing: -1px; margin-bottom: 6px;
      background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle { font-size: 15px; font-weight: 400; color: #3a3a3a; letter-spacing: 0.2px; }

    .controls { width: 100%; max-width: 560px; margin-bottom: 36px; }
    .generate-btn {
      width: 100%; padding: 16px 28px; background: #f0f0f0; color: #0a0a0a; border: none;
      border-radius: 14px; font-family: inherit; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
      -webkit-appearance: none; position: relative; overflow: hidden;
    }
    .generate-btn::after {
      content: ''; position: absolute; top: 0; left: 0; width: 45%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: translateX(-100%) skewX(-15deg);
      animation: btnShimmer 4s ease-in-out 2s infinite;
      pointer-events: none;
    }
    @keyframes btnShimmer {
      0%, 100% { transform: translateX(-100%) skewX(-15deg); }
      40% { transform: translateX(320%) skewX(-15deg); }
      40.01%, 99.99% { transform: translateX(-100%) skewX(-15deg); }
    }
    .generate-btn:active { transform: scale(0.97); opacity: 0.92; }
    .generate-btn.loading { opacity: 0.35; pointer-events: none; }
    .generate-btn.loading::after { display: none; }

    .posts-container { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 14px; }

    .post-card {
      background: #141414; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
      padding: 22px 22px 18px; position: relative; overflow: hidden;
      opacity: 0; transform: translateY(32px) scale(0.96);
      transition: background 0.2s, border-color 0.3s, box-shadow 0.3s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.15);
    }
    .post-card.enter {
      animation: cardEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .post-card:nth-child(1) { animation-delay: 0s; }
    .post-card:nth-child(2) { animation-delay: 0.08s; }
    .post-card:nth-child(3) { animation-delay: 0.16s; }

    @keyframes cardEnter {
      0% { opacity: 0; transform: translateY(40px) scale(0.94); }
      50% { opacity: 1; }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .post-card:active { background: #181818; border-color: rgba(255,255,255,0.1); }
    .post-text { font-size: 15px; line-height: 1.65; letter-spacing: -0.15px; white-space: pre-wrap; color: #b0b0b0; margin-bottom: 18px; }
    .post-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.04);
    }
    .char-count { font-size: 11px; color: #333; font-variant-numeric: tabular-nums; }
    .post-actions { display: flex; gap: 8px; }
    .btn-edit, .btn-post {
      padding: 10px 18px; border-radius: 10px; font-family: inherit; font-size: 13px;
      font-weight: 500; cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s, color 0.2s, opacity 0.2s;
      -webkit-appearance: none;
    }
    .btn-edit { background: transparent; color: #555; border: 1px solid rgba(255,255,255,0.08); }
    .btn-edit:active { transform: scale(0.94); background: rgba(255,255,255,0.04); color: #999; }
    .btn-post { background: #f0f0f0; color: #0a0a0a; border: none; font-weight: 600; }
    .btn-post:active { transform: scale(0.94); opacity: 0.85; }

    .post-card.posted {
      animation: cardPosted 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes cardPosted {
      0% { transform: scale(1); opacity: 1; }
      30% { transform: scale(1.02); }
      100% { transform: scale(0.98); opacity: 0.2; }
    }
    .post-card.posted { pointer-events: none; }
    .post-card.posted::after {
      content: 'Posted'; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); background: #f0f0f0; color: #0a0a0a;
      padding: 10px 28px; border-radius: 12px; font-weight: 600; font-size: 14px;
      letter-spacing: -0.2px;
      animation: postedBadge 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.12s both;
    }
    @keyframes postedBadge {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      60% { opacity: 1; }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* Paywall */
    .paywall-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: #0a0a0a; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 24px;
      opacity: 0;
    }
    .paywall-overlay.active {
      display: flex;
      animation: paywallIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes paywallIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .paywall-overlay h2 {
      font-size: 24px; font-weight: 600; color: #f5f5f5; margin-bottom: 8px; text-align: center;
      animation: payItemIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }
    .paywall-overlay .paywall-sub {
      font-size: 15px; color: #555; margin-bottom: 32px; text-align: center;
      animation: payItemIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }
    .paywall-features {
      list-style: none; width: 100%; max-width: 340px; margin-bottom: 36px;
    }
    .paywall-features li {
      display: flex; align-items: center; gap: 12px;
      font-size: 15px; color: #999; padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      opacity: 0; transform: translateX(-12px);
    }
    .paywall-features li:nth-child(1) { animation: payFeatureIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both; }
    .paywall-features li:nth-child(2) { animation: payFeatureIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both; }
    .paywall-features li:nth-child(3) { animation: payFeatureIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both; }
    .paywall-features li:nth-child(4) { animation: payFeatureIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both; }
    .paywall-features li:last-child { border-bottom: none; }
    .paywall-features .check { color: #5cb88a; font-size: 18px; flex-shrink: 0; }
    @keyframes payFeatureIn {
      0% { opacity: 0; transform: translateX(-12px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes payItemIn {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .subscribe-btn {
      width: 100%; max-width: 340px; padding: 16px 28px; background: #f0f0f0; color: #0a0a0a;
      border: none; border-radius: 14px; font-family: inherit; font-size: 16px; font-weight: 600;
      cursor: pointer; -webkit-appearance: none; transition: all 0.15s; margin-bottom: 16px;
      animation: payItemIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
    }
    .subscribe-btn:active { transform: scale(0.97); opacity: 0.9; }
    .paywall-price {
      font-size: 13px; color: #333; text-align: center;
      animation: payItemIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.75s both;
    }

    /* Sneak button */
    .sneak-btn {
      margin-top: 28px; padding: 10px 20px; background: transparent; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; font-family: inherit; font-size: 13px; font-weight: 400;
      color: #333; cursor: pointer; -webkit-appearance: none; transition: all 0.2s;
      animation: payItemIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
    }
    .sneak-btn:active { background: rgba(255,255,255,0.03); color: #555; }

    /* Posts badge */
    .posts-badge {
      position: fixed; top: calc(env(safe-area-inset-top, 12px) + 12px); right: 16px;
      font-size: 11px; font-weight: 500; color: #555; padding: 6px 12px;
      background: rgba(20,20,20,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 20px; border: 1px solid rgba(255,255,255,0.06);
      font-variant-numeric: tabular-nums; z-index: 50;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }
    .posts-badge.warning { color: #c79050; border-color: rgba(199,144,80,0.15); }
    .posts-badge.pulse {
      animation: badgePulse 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes badgePulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    .badge-num {
      display: inline-block; transition: none;
    }
    .badge-num.roll-out {
      animation: numRollOut 0.25s cubic-bezier(0.4, 0, 1, 1) forwards;
    }
    .badge-num.roll-in {
      animation: numRollIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes numRollOut {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-12px); opacity: 0; }
    }
    @keyframes numRollIn {
      0% { transform: translateY(12px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 14px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      text-align: center; font-family: inherit; font-size: 13px; font-weight: 500;
      transform: translateY(100%); transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      letter-spacing: -0.1px;
    }
    .status-bar.show { transform: translateY(0); }
    .status-bar.success { background: rgba(25,45,35,0.92); color: #5cb88a; border-top: 1px solid rgba(92,184,138,0.12); }
    .status-bar.info { background: rgba(20,20,20,0.92); color: #666; border-top: 1px solid rgba(255,255,255,0.06); }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(10,10,10,0.3); border-top-color: #0a0a0a;
      border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Schedule button on cards */
    .btn-schedule {
      padding: 10px 12px; border-radius: 10px; font-family: inherit; font-size: 13px;
      font-weight: 500; cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s, color 0.2s;
      -webkit-appearance: none;
      background: transparent; color: #555; border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 0;
    }
    .btn-schedule:active { transform: scale(0.9); background: rgba(255,255,255,0.04); color: #999; }
    .btn-schedule svg { width: 15px; height: 15px; }

    /* Bottom sheet overlay */
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sheet-overlay.active { opacity: 1; pointer-events: auto; }

    /* Bottom sheet */
    .schedule-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 301;
      background: #1a1a1a; border-top-left-radius: 20px; border-top-right-radius: 20px;
      padding: 0 24px calc(env(safe-area-inset-bottom, 16px) + 16px);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .schedule-sheet.active { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px;
      margin: 10px auto 20px;
    }
    .sheet-title {
      font-size: 17px; font-weight: 600; color: #f5f5f5; text-align: center; margin-bottom: 24px;
    }

    /* Day pills */
    .day-pills {
      display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .day-pills::-webkit-scrollbar { display: none; }
    .day-pill {
      flex-shrink: 0; padding: 10px 18px; border-radius: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06);
      color: #888; font-family: inherit; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; -webkit-appearance: none;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .day-pill .day-label { font-size: 14px; }
    .day-pill .day-date { font-size: 11px; opacity: 0.5; }
    .day-pill.selected {
      background: #f0f0f0; color: #0a0a0a; border-color: transparent;
    }
    .day-pill.selected .day-date { opacity: 0.6; }
    .day-pill:active { transform: scale(0.96); }

    /* Time picker */
    .time-section { margin-bottom: 28px; }
    .time-label { font-size: 13px; color: #444; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .time-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .time-slot {
      padding: 12px 8px; border-radius: 10px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06);
      color: #888; font-family: inherit; font-size: 14px; font-weight: 500;
      text-align: center; cursor: pointer; transition: all 0.2s; -webkit-appearance: none;
    }
    .time-slot.selected { background: #f0f0f0; color: #0a0a0a; border-color: transparent; }
    .time-slot:active { transform: scale(0.96); }
    .time-slot.past { opacity: 0.25; pointer-events: none; }

    /* Custom time row */
    .custom-time-row {
      display: flex; align-items: center; gap: 10px; margin-top: 12px;
    }
    .custom-time-input {
      flex: 1; padding: 12px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06);
      color: #e8e8e8; font-family: inherit; font-size: 15px; font-weight: 500;
      -webkit-appearance: none; outline: none;
      color-scheme: dark;
    }
    .custom-time-input:focus { border-color: rgba(255,255,255,0.15); }

    /* Confirm button */
    .schedule-confirm {
      width: 100%; padding: 16px; background: #f0f0f0; color: #0a0a0a;
      border: none; border-radius: 14px; font-family: inherit; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; -webkit-appearance: none;
      opacity: 0.3; pointer-events: none;
    }
    .schedule-confirm.ready { opacity: 1; pointer-events: auto; }
    .schedule-confirm:active { transform: scale(0.97); opacity: 0.9; }

    /* Scheduled queue */
    .queue-section {
      width: 100%; max-width: 560px; margin-top: 32px;
    }
    .queue-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .queue-title {
      font-size: 14px; font-weight: 600; color: #444; text-transform: uppercase;
      letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px;
    }
    .queue-count {
      background: rgba(255,255,255,0.06); color: #666; font-size: 12px;
      padding: 3px 8px; border-radius: 6px; font-weight: 600;
    }
    .queue-toggle {
      color: #333; font-size: 18px; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .queue-header.open .queue-toggle { transform: rotate(180deg); }

    .queue-list {
      display: flex; flex-direction: column; gap: 8px;
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .queue-list.open { max-height: 2000px; }

    .queue-item {
      background: #141414; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px;
      padding: 16px 18px; position: relative;
      animation: cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .queue-item-top {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
    }
    .queue-time {
      font-size: 13px; font-weight: 600; color: #5cb88a;
      display: flex; align-items: center; gap: 6px;
    }
    .queue-time svg { width: 13px; height: 13px; }
    .queue-time.due { color: #f0f0f0; }
    .queue-actions { display: flex; gap: 6px; }
    .queue-btn {
      padding: 6px 12px; border-radius: 8px; font-family: inherit; font-size: 12px;
      font-weight: 500; cursor: pointer; transition: all 0.15s; -webkit-appearance: none;
    }
    .queue-btn-post {
      background: #f0f0f0; color: #0a0a0a; border: none; font-weight: 600;
    }
    .queue-btn-post:active { opacity: 0.8; }
    .queue-btn-cancel {
      background: transparent; color: #444; border: 1px solid rgba(255,255,255,0.06);
    }
    .queue-btn-cancel:active { color: #666; background: rgba(255,255,255,0.04); }
    .queue-text {
      font-size: 14px; line-height: 1.6; color: #777; white-space: pre-wrap;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Due pulse on queue items */
    .queue-item.due {
      border-color: rgba(240,240,240,0.15);
      animation: duePulse 2s ease-in-out infinite;
    }
    @keyframes duePulse {
      0%, 100% { border-color: rgba(240,240,240,0.08); }
      50% { border-color: rgba(240,240,240,0.2); }
    }

    /* Empty queue */
    .queue-empty {
      text-align: center; padding: 24px; color: #2a2a2a; font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AutoPost</h1>
    <div class="subtitle">AI content posting agent</div>
  </div>

  <div class="controls">
    <button class="generate-btn" id="generateBtn" onclick="generate()">Generate</button>
  </div>

  <div class="posts-container" id="postsContainer"></div>
  <div class="posts-badge" id="postsBadge" style="display:none"></div>

  <div class="paywall-overlay" id="paywall">
    <h2>Upgrade to Pro</h2>
    <div class="paywall-sub">You've used your free posts</div>
    <ul class="paywall-features">
      <li><span class="check">&#10003;</span> Market insights from leading experts</li>
      <li><span class="check">&#10003;</span> Priceless educational content</li>
      <li><span class="check">&#10003;</span> Generate, click - posted</li>
      <li><span class="check">&#10003;</span> AI agent automation (coming soon)</li>
    </ul>
    <button class="subscribe-btn" onclick="handleSubscribe()">Subscribe</button>
    <div class="paywall-price">$20/month &middot; Cancel anytime</div>
    <button class="sneak-btn" id="sneakBtn" style="display:none" onclick="handleSneak()"></button>
  </div>

  <!-- Schedule bottom sheet -->
  <div class="sheet-overlay" id="sheetOverlay" onclick="closeScheduleSheet()"></div>
  <div class="schedule-sheet" id="scheduleSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Schedule Post</div>
    <div class="day-pills" id="dayPills"></div>
    <div class="time-section">
      <div class="time-label">Time</div>
      <div class="time-grid" id="timeGrid"></div>
      <div class="custom-time-row">
        <input type="time" class="custom-time-input" id="customTime" onchange="selectCustomTime()">
      </div>
    </div>
    <button class="schedule-confirm" id="scheduleConfirm" onclick="confirmSchedule()">Schedule</button>
  </div>

  <!-- Scheduled queue -->
  <div class="queue-section" id="queueSection" style="display:none">
    <div class="queue-header" id="queueHeader" onclick="toggleQueue()">
      <div class="queue-title">
        Scheduled <span class="queue-count" id="queueCount">0</span>
      </div>
      <span class="queue-toggle">&#9662;</span>
    </div>
    <div class="queue-list" id="queueList"></div>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <script>
    const ALL_POSTS = [{"pillar":"PORTFOLIO STRATEGY","content":"BTC at 40-60% of your portfolio isn't conservative. It's what lets you sleep at night and still be in the game 4 years from now."},{"pillar":"PORTFOLIO STRATEGY","content":"If you can't explain why you own something in one sentence, your position size should be zero."},{"pillar":"PORTFOLIO STRATEGY","content":"Stablecoins aren't a sign of weakness. Cash is a position. The best traders I know hold 20-30% dry powder at all times."},{"pillar":"PORTFOLIO STRATEGY","content":"The difference between a 2% allocation and a 10% allocation is the difference between a story and a conviction."},{"pillar":"PORTFOLIO STRATEGY","content":"Every alt in your portfolio is a venture bet. Size it like one. 2-5% max. If it 10x's, you'll still feel it. If it zeros, you survive."},{"pillar":"PORTFOLIO STRATEGY","content":"I've never met a rich trader who didn't have a stop-loss discipline. I've met plenty of broke ones who didn't."},{"pillar":"PORTFOLIO STRATEGY","content":"Your portfolio should answer one question: \"If I'm wrong about everything except BTC, do I still make it?\" If no, restructure."},{"pillar":"PORTFOLIO STRATEGY","content":"Cold storage isn't paranoia. It's what separated the people who recovered from FTX from the ones who didn't."},{"pillar":"PORTFOLIO STRATEGY","content":"Taking 20% profit on a 3x feels wrong in the moment and brilliant 6 months later. Every single time."},{"pillar":"PORTFOLIO STRATEGY","content":"The most dangerous phrase in crypto: \"I'll take profits on the way down.\" No you won't. Set levels now."},{"pillar":"PORTFOLIO STRATEGY","content":"You don't need 20 coins. You need 5 high-conviction positions and the discipline to size them correctly."},{"pillar":"PORTFOLIO STRATEGY","content":"The goal isn't maximum exposure. The goal is asymmetric return. Big upside, bounded downside. That's how professionals think."},{"pillar":"PORTFOLIO STRATEGY","content":"If your portfolio is 90% alts, you don't have a strategy. You have a lottery ticket collection."},{"pillar":"PORTFOLIO STRATEGY","content":"The best risk management tool in crypto is a spreadsheet. Track every position, every entry, every thesis. If you can't track it, you can't manage it."},{"pillar":"PORTFOLIO STRATEGY","content":"Diversification in crypto doesn't mean owning 30 tokens. It means owning uncorrelated assets across different thesis categories."},{"pillar":"PORTFOLIO STRATEGY","content":"Bull market portfolio vs bear market portfolio are two different animals. If you're running the same allocation in both, you're doing it wrong."},{"pillar":"PORTFOLIO STRATEGY","content":"Leverage in crypto is a loaded gun pointed at your portfolio. I've used it exactly twice in 15 years. Both times under 2x. Both times with a hard stop."},{"pillar":"PORTFOLIO STRATEGY","content":"DCA into BTC is boring. It also outperforms 90% of active traders over any 4-year period. Boring works."},{"pillar":"PORTFOLIO STRATEGY","content":"You don't have diamond hands. You have no exit plan. There's a difference."},{"pillar":"PORTFOLIO STRATEGY","content":"The traders who survive decades all share one trait: they cut losers fast and let winners run. Simple to say, brutal to execute."},{"pillar":"PORTFOLIO STRATEGY","content":"If you're checking your portfolio more than twice a day, your position sizes are too large for your risk tolerance."},{"pillar":"PORTFOLIO STRATEGY","content":"Conviction without position sizing is just gambling with extra steps."},{"pillar":"PORTFOLIO STRATEGY","content":"Your first 10% gain in crypto feels life-changing. Your first 50% drawdown teaches you everything. The second one shouldn't happen."},{"pillar":"PORTFOLIO STRATEGY","content":"Rebalancing quarterly forces you to sell high and buy low automatically. It's systematic profit-taking disguised as maintenance."},{"pillar":"PORTFOLIO STRATEGY","content":"I keep a \"kill list\" — prices where I exit every alt no matter what. Decided in advance, when I'm rational. Not in the middle of a -40% candle."},{"pillar":"PORTFOLIO STRATEGY","content":"Hardware wallet + metal seed backup + geographic distribution. That's not paranoia, that's basic operational security for serious capital."},{"pillar":"PORTFOLIO STRATEGY","content":"I've watched 3 friends lose 6-figure portfolios to exchange hacks. Not one had funds in cold storage. Don't be the lesson someone else learns from."},{"pillar":"PORTFOLIO STRATEGY","content":"The Kelly Criterion says bet proportional to your edge. In crypto, most people massively overestimate their edge. Size down."},{"pillar":"PORTFOLIO STRATEGY","content":"Your alt portfolio should be a barbell: 70% in top-10 infrastructure plays, 30% in high-conviction moonshots. Nothing in the mushy middle."},{"pillar":"PORTFOLIO STRATEGY","content":"I review my portfolio thesis every Sunday. If I can't re-justify a position, I cut it Monday. No emotions, no exceptions."},{"pillar":"PORTFOLIO STRATEGY","content":"The biggest portfolio mistake isn't buying the wrong coin. It's putting 30% into it."},{"pillar":"PORTFOLIO STRATEGY","content":"5 signs your crypto portfolio is too risky:\n\n1. No BTC position above 30%\n2. Any single alt above 10%\n3. Zero stablecoin allocation\n4. You can't sleep during a -15% day\n5. You don't have exit prices written down"},{"pillar":"PORTFOLIO STRATEGY","content":"Asset allocation explains 90% of returns in traditional finance. In crypto it explains 99%. Get the weights right and the picks matter less."},{"pillar":"PORTFOLIO STRATEGY","content":"I'd rather own 3 BTC than 30 different altcoins worth 3 BTC total. Concentration in quality beats diversification in garbage."},{"pillar":"PORTFOLIO STRATEGY","content":"The hardest trade in crypto isn't buying the dip. It's selling when you're up 500% and everyone is calling for 1000%."},{"pillar":"PORTFOLIO STRATEGY","content":"Risk management isn't fear. It's the reason I've been profitable across 4 full crypto cycles while most people blew up after 1."},{"pillar":"PORTFOLIO STRATEGY","content":"Your portfolio's worst day should never threaten your ability to stay in the game. If it does, you're over-allocated."},{"pillar":"PORTFOLIO STRATEGY","content":"I treat every new alt position like a VC investment: fixed check size, known max loss, multi-year hold or zero. No middle ground."},{"pillar":"PORTFOLIO STRATEGY","content":"There's a reason institutions allocate 1-5% to crypto. It's not because they don't believe in it. It's because they understand position sizing."},{"pillar":"PORTFOLIO STRATEGY","content":"Write down your portfolio allocation today. Put it in a drawer. Open it in 12 months. You'll either be grateful or educated."},{"pillar":"PORTFOLIO STRATEGY","content":"Everyone has a plan until BTC drops 40% in a week. That's when you find out if your allocation was a strategy or a wish."},{"pillar":"PORTFOLIO STRATEGY","content":"The best trade I ever made was moving 60% of my portfolio to BTC in Nov 2021 when alts were flying. Felt stupid then. Saved me $200K+."},{"pillar":"PORTFOLIO STRATEGY","content":"Your net worth should not be 100% crypto. Real diversification includes assets outside this ecosystem entirely."},{"pillar":"PORTFOLIO STRATEGY","content":"Position sizing protects you from yourself. It turns emotional decisions into mathematical ones. That's its real power."},{"pillar":"PORTFOLIO STRATEGY","content":"If you're up 10x on an alt and haven't taken a single dollar off the table, you're not investing. You're hoping."},{"pillar":"PORTFOLIO STRATEGY","content":"Tax-loss harvesting in crypto is free money most people ignore. Sell losers in December, repurchase in January. Reduce your tax bill legally."},{"pillar":"PORTFOLIO STRATEGY","content":"I split my portfolio across 3 hardware wallets and 2 multisig setups. The inconvenience is intentional. It prevents impulse trades."},{"pillar":"PORTFOLIO STRATEGY","content":"The 1% rule: never risk more than 1% of your total portfolio on a single trade idea. Over 100 trades, you'll survive every losing streak."},{"pillar":"PORTFOLIO STRATEGY","content":"Everyone talks about their wins. Nobody posts the 7 alts that went to zero funding those wins. Survivorship bias is real. Size accordingly."},{"pillar":"PORTFOLIO STRATEGY","content":"My bear market portfolio: 60% BTC, 20% stables, 15% ETH, 5% high-conviction alts. My bull market portfolio: 45% BTC, 25% alts, 20% ETH, 10% stables."},{"pillar":"PORTFOLIO STRATEGY","content":"If you wouldn't buy it today at this price, you shouldn't hold it today at this price. Sunk cost fallacy kills portfolios."},{"pillar":"CRYPTO + AI","content":"AI agents will need wallets before they need bodies. The first trillion-dollar AI economy will run on stablecoins and smart contracts, not bank accounts."},{"pillar":"CRYPTO + AI","content":"The AI agent economy needs three things: identity, payments, and trust. Crypto solves all three. That's not a coincidence."},{"pillar":"CRYPTO + AI","content":"When AI agents start paying other AI agents for services, they won't use Visa. They'll use programmable money on rails that never close."},{"pillar":"CRYPTO + AI","content":"Decentralized GPU markets are offering the same compute at a lower price."},{"pillar":"CRYPTO + AI","content":"AI models are getting cheaper to run. But they're running more often. Total compute demand is exploding. Decentralized GPU networks capture that overflow."},{"pillar":"CRYPTO + AI","content":"AI agents executing DeFi strategies already outperform manual traders on average. The question isn't if DeFi goes autonomous — it's when."},{"pillar":"CRYPTO + AI","content":"The best AI x crypto projects have one thing in common: the token accrues value from compute demand, not speculation. Revenue > narrative."},{"pillar":"CRYPTO + AI","content":"The AI token I'm most interested in? The one where token burns are tied to compute usage. Not governance. Not staking rewards. Usage."},{"pillar":"CRYPTO + AI","content":"DePIN + AI = decentralized physical infrastructure running AI workloads. It's ugly, it's early, and it's generating real cash flow today."},{"pillar":"CRYPTO + AI","content":"AI agents partially managing treasury for DAOs will be standard within 2 years. Smarter allocation, 24/7 rebalancing, no human ego. It's just better."},{"pillar":"CRYPTO + AI","content":"The middleware layer between AI agents and blockchains is where the next billion-dollar protocol lives. Watch for projects building agent SDKs on-chain."},{"pillar":"CRYPTO + AI","content":"The Crypto x AI thesis is about building the economic layer that all AI agents — centralized or not — need to transact."},{"pillar":"CRYPTO + AI","content":"Most AI agent projects are demos pretending to be products. The ones with real on-chain transaction volume are the ones worth tracking."},{"pillar":"CRYPTO + AI","content":"Autonomous AI agents will generate more blockchain transactions than humans within 5 years."},{"pillar":"CRYPTO + AI","content":"Agent-to-agent payments will start with micro-transactions: an AI paying another AI $0.001 for a data query. Banks can't process this. Crypto can."},{"pillar":"CRYPTO + AI","content":"The AI narrative in crypto will have the same arc as DeFi: 90% of projects die, 10% become critical infrastructure."},{"pillar":"CRYPTO + AI","content":"The compute layer is crypto's strongest AI play. It has demand. It has revenue. It has a clear path to token value."},{"pillar":"CRYPTO + AI","content":"People asking \"is AI x crypto real?\" are asking the wrong question. The right question is: which AI x crypto projects have sustainable economics and tokenomics?"},{"pillar":"CRYPTO + AI","content":"AI will make DeFi accessible to everyone. Natural language to swap. Agent-managed portfolios. Automated risk assessment. The UX revolution is AI-powered."},{"pillar":"US REGULATORY & MACRO","content":"BTC ETF inflows are absorbing more than the daily mining supply. Basic supply-demand math."},{"pillar":"US REGULATORY & MACRO","content":"Stablecoin legislation is the most important crypto bill in Washington right now. It legitimizes the entire on-chain dollar system overnight."},{"pillar":"US REGULATORY & MACRO","content":"A Strategic Bitcoin Reserve means the US government is treating BTC as a reserve asset alongside gold. Re-read that sentence slowly."},{"pillar":"US REGULATORY & MACRO","content":"Washington isn't trying to kill crypto anymore. They're trying to control it. That's actually more bullish than you think."},{"pillar":"US REGULATORY & MACRO","content":"The ETH ETF approval was the market saying: crypto isn't going away. The stablecoin bill will be the market saying: crypto is going mainstream in a long run."},{"pillar":"US REGULATORY & MACRO","content":"Fed net liquidity is the one of the best indicators of BTC price direction. When liquidity expands, BTC rallies. When it contracts, BTC corrects."},{"pillar":"US REGULATORY & MACRO","content":"Stablecoins are America's secret weapon for dollar dominance. $160B+ in dollar-denominated stablecoins circulating globally. Treasury gets it."},{"pillar":"US REGULATORY & MACRO","content":"Most of the major financial institutions now have a crypto desk. The infrastructure for institutional adoption is more developed than people expect."},{"pillar":"US REGULATORY & MACRO","content":"The SEC's approach is shifting from \"regulate by enforcement\" to actual rulemaking. This gives projects legal clarity to build in the US. Bullish."},{"pillar":"US REGULATORY & MACRO","content":"The real ETF story isn't about price. It's about legitimacy. BTC went from \"internet money\" to a regulated, auditable, institutionally-held asset in 12 months."},{"pillar":"US REGULATORY & MACRO","content":"The TGA (Treasury General Account) draining is a stealth liquidity injection. When the government spends its savings, that money enters the system. BTC responds."},{"pillar":"US REGULATORY & MACRO","content":"ETF approval → stablecoin bill → market structure legislation → tokenized securities framework. This is the regulatory roadmap. We're at stage 2."},{"pillar":"US REGULATORY & MACRO","content":"When both parties in Congress are competing to be more pro-crypto, you're not early anymore. But you're not late either. The institutional wave is just starting."},{"pillar":"US REGULATORY & MACRO","content":"BTC is the only asset that benefits from both inflationary AND deflationary macro scenarios. Inflation → hard money narrative. Deflation → central bank printing response."},{"pillar":"US REGULATORY & MACRO","content":"The stablecoin market is at $160B. If the legislation passes, it goes to $500B+ within 18 months. That's $500B in demand for US treasuries. Congress understands this."},{"pillar":"US REGULATORY & MACRO","content":"Rate cuts are bullish for crypto only if they happen without a crisis. Crisis cuts mean risk-off first, rally later. The path matters as much as the destination."},{"pillar":"US REGULATORY & MACRO","content":"The USD stablecoin market is the fastest-growing dollar product in history. And it's making the dollar stronger, not weaker. That's why Congress will pass the bill."},{"pillar":"US REGULATORY & MACRO","content":"A spot ETH ETF with staking would generate 3-4% yield for institutional holders. That makes ETH a yield-bearing digital asset. The implications are enormous."},{"pillar":"US REGULATORY & MACRO","content":"Regulatory clarity, institutional infrastructure, and sovereign interest are making the stars aligned."},{"pillar":"US REGULATORY & MACRO","content":"Markets front-run the Fed by 6-9 months. If you wait for the rate cut announcement to buy crypto, you're already late. Price in the probability, not the event."},{"pillar":"US REGULATORY & MACRO","content":"The reverse repo facility draining from $2.5T to near-zero was the largest liquidity injection in modern history. And it happened while BTC went from $16K to $70K+. Not a coincidence."},{"pillar":"US REGULATORY & MACRO","content":"The next wave of crypto regulation will focus on DeFi. Protocols with clear compliance frameworks will outperform. Those without will face existential risk."},{"pillar":"US REGULATORY & MACRO","content":"Sovereign wealth funds are allocating to BTC. Abu Dhabi, Norway, Singapore — all have exposure through ETFs or direct holdings. This is the new normal."},{"pillar":"US REGULATORY & MACRO","content":"The Fed's dual mandate is full employment and price stability. Crypto thrives when one mandate fails and the Fed has to choose. That's the macro edge."},{"pillar":"US REGULATORY & MACRO","content":"The biggest risk to crypto is liquidity crisis where everything sells off simultaneously. Hold stables for this scenario."},{"pillar":"US REGULATORY & MACRO","content":"The Treasury yield curve un-inverting historically precedes risk-on rallies by 6-12 months. We're in that window now. History doesn't repeat but it rhymes quite often."},{"pillar":"US REGULATORY & MACRO","content":"If the US Strategic Bitcoin Reserve grows to 1M+ BTC, it would be the largest single holder besides Satoshi. That's a $100B+ position at current prices."},{"pillar":"US REGULATORY & MACRO","content":"Central bank balance sheets globally are at $30T+. Even a 1% allocation to BTC = $300B in buying pressure on an asset with $1.5T market cap. Do the math."},{"pillar":"CYCLE AWARENESS","content":"Everyone knows to \"buy low, sell high.\" Almost nobody does it. Because buying low feels terrifying and selling high feels stupid."},{"pillar":"CYCLE AWARENESS","content":"The best time to buy crypto was when you didn't want to. Oct 2022. March 2020. Dec 2018. The worst time was when everyone was telling you to."},{"pillar":"CYCLE AWARENESS","content":"The crypto cycle lasts ~4 years. 12-18 months of accumulation. 12 months of markup. 6 months of euphoria. 12-18 months of decline. Know where you are."},{"pillar":"CYCLE AWARENESS","content":"Market outflows hitting multi-year highs = accumulation. Market inflows spiking = distribution. This is the most reliable on-chain signal. Track it."},{"pillar":"CYCLE AWARENESS","content":"Most people buy crypto for the first time at all-time highs. That's not their fault — that's when media coverage peaks. It's your job to be earlier."},{"pillar":"CYCLE AWARENESS","content":"The most profitable position in crypto is the one you entered when nobody cared. Accumulation zones feel lonely. That's how you know they're working."},{"pillar":"CYCLE AWARENESS","content":"Every cycle, 80% of altcoins from the previous cycle never recover their highs. SOL was the exception, not the rule. Don't marry your alts."},{"pillar":"CYCLE AWARENESS","content":"Bear markets feel like they'll last forever. Bull markets feel like they'll never end. Both feelings are wrong. Plan for both outcomes."},{"pillar":"CYCLE AWARENESS","content":"The smartest thing I did in 2022 wasn't any trade. It was staying in the market at all. 90% of people who left in the bear haven't come back yet."},{"pillar":"CYCLE AWARENESS","content":"On-chain data doesn't lie, but it speaks quietly. Exchange reserves, whale wallets, miner behavior — these told the story 3 months before the price did."},{"pillar":"CYCLE AWARENESS","content":"The 200-week moving average has been the single best long-term buy signal for BTC. It's been touched 4 times. Each time marked a generational entry."},{"pillar":"CYCLE AWARENESS","content":"The people who made generational wealth in crypto did one thing: they bought during capitulation events and held through recovery. Simple. Not easy."},{"pillar":"CYCLE AWARENESS","content":"The accumulation zone is where wealth is built. The euphoria zone is where wealth is captured. Most people confuse the two and do both wrong."},{"pillar":"CYCLE AWARENESS","content":"Every cycle has a moment where BTC drops 30%+ and everyone declares the bull market over. It's happened in every single cycle. It's a buying opportunity, not an exit."},{"pillar":"CYCLE AWARENESS","content":"The worst time to develop a thesis is when you're staring at a -50% portfolio."},{"pillar":"CYCLE AWARENESS","content":"The biggest alpha in crypto is patience. Being right about direction but wrong about timing has destroyed dozens of good portfolios."},{"pillar":"CYCLE AWARENESS","content":"7 lessons from surviving 4 crypto cycles:\n\n1. The bottom feels like the end\n2. The top feels like the beginning\n3. 90% of alts die between cycles\n4. BTC always leads the recovery\n5. Leverage kills in bear markets\n6. Cash in a crash is a superpower\n7. The cycle always comes back"},{"pillar":"CYCLE AWARENESS","content":"The smart money accumulates when daily trading volume drops 70%+ from peak. Low volume + low price = disinterest. Disinterest = opportunity."},{"pillar":"CYCLE AWARENESS","content":"In every cycle, there's a \"this is the last dip\" moment followed by an actual last dip that's significantly lower. Buying in tranches solves this problem."},{"pillar":"MACRO MOVES","content":"Japan's yield curve control ending indeed sent shockwaves through global bond markets"},{"pillar":"MACRO MOVES","content":"Real yields (nominal yield minus inflation) are what matter. If inflation falls faster than rates, real yields rise and crypto faces headwinds even during cuts."},{"pillar":"MACRO MOVES","content":"Credit spreads widening = risk-off. Credit spreads tightening = risk-on. Crypto trades as a high beta risk asset. When spreads tighten, BTC outperforms everything."},{"pillar":"MACRO MOVES","content":"Crypto winter doesn't start with a price crash. It starts with liquidity drying up. By the time you see the crash, the liquidity exit was 3 months ago."},{"pillar":"MACRO MOVES","content":"The Fed's balance sheet is still above $7T. In 2019, it was $3.8T. Even after QT, we're swimming in more liquidity than any pre-2020 period."},{"pillar":"MACRO MOVES","content":"Oil prices above $100 = inflation pressure = hawkish Fed = bad for crypto."},{"pillar":"MACRO MOVES","content":"The Fed dot plot matters more than the actual rate decision. Markets care about the path of rates, not today's rate. A hold with dovish dots is more bullish than a cut with hawkish dots."},{"pillar":"MACRO MOVES","content":"Unemployment rising slowly is ignored. Unemployment rising quickly triggers recession fears and emergency cuts. The speed of deterioration matters more than the number."},{"pillar":"MACRO MOVES","content":"BTC's role in a macro portfolio is changing. It went from pure speculation to a hybrid: part growth asset, part inflation hedge, part liquidity barometer."},{"pillar":"MACRO MOVES","content":"Global debt-to-GDP above 350%. The only way to manage this debt is to inflate it away or default. Both outcomes are massively bullish for BTC over 10 years."},{"pillar":"MACRO MOVES","content":"Interest payments on US debt now exceed $1T/year. That's $1T that needs to be financed."},{"pillar":"MACRO MOVES","content":"When the yield curve steepens from inverted to normal, risk assets rally for 12-18 months. We're in the early innings of that steepening now."},{"pillar":"PORTFOLIO STRATEGY","content":"A basic difference between gambling and investing in crypto: a written plan with entry prices, exit prices, position sizes."},{"pillar":"CRYPTO + AI","content":"Most AI tokens are trading on narrative. Revenue matters."},{"pillar":"CRYPTO + AI","content":"Autonomous AI agents managing DeFi positions is what we see happening."},{"pillar":"CYCLE AWARENESS","content":"Google Trends for \"buy bitcoin\" is a lagging indicator. By the time searches spike, smart money has already accumulated. Sometimes using it as a contrarian signal is a better idea."},{"pillar":"CYCLE AWARENESS","content":"The best cycle strategy isn't timing tops and bottoms. It's DCA in the bottom quartile and DCA out in the top quartile. Range-based, not point-based."}];

    // ---- Rolling window ----
    const WINDOW_SIZE = 700;
    const shownIndices = JSON.parse(localStorage.getItem('ap_shown') || '[]');
    function saveWindow() { localStorage.setItem('ap_shown', JSON.stringify(shownIndices.slice(-WINDOW_SIZE))); }

    function fisherYates(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function pickThreePosts() {
      const recentSet = new Set(shownIndices.slice(-Math.min(shownIndices.length, WINDOW_SIZE)));
      let available = ALL_POSTS.map((_, i) => i).filter(i => !recentSet.has(i));
      if (available.length < 3) {
        shownIndices.splice(0, Math.floor(shownIndices.length / 2));
        const freshSet = new Set(shownIndices);
        available = ALL_POSTS.map((_, i) => i).filter(i => !freshSet.has(i));
      }
      if (available.length < 3) available = ALL_POSTS.map((_, i) => i);
      const picked = fisherYates(available).slice(0, 3);
      picked.forEach(i => shownIndices.push(i));
      if (shownIndices.length > WINDOW_SIZE * 2) shownIndices.splice(0, shownIndices.length - WINDOW_SIZE);
      saveWindow();
      return picked.map(i => {
        let text = ALL_POSTS[i].content;
        if (!text.endsWith('\nNFA')) text += '\nNFA';
        if (text.length > 280) text = text.slice(0, 276) + '\nNFA';
        return text;
      });
    }

    // ---- Free post tracking with sneak rounds ----
    let postsUsed = parseInt(localStorage.getItem('ap_posts_used') || '0');
    let sneakRound = parseInt(localStorage.getItem('ap_sneak_round') || '0');

    // sneakRound meanings:
    // 0 = first 5 free posts (initial)
    // 1 = "5 more?"
    // 2 = "Ok, 5 other and that's it"
    // 3 = "3 last ones"
    // 4 = "Still here?"
    // 5 = "Long time no see"
    // 6 = "Again you?"
    // 7 = "Thank you for vibing with AutoPost"
    // 8 = final paywall, no more sneaks

    const sneakMessages = [
      null, // round 0, no sneak btn
      '5 more?',
      'Ok, 5 other and that\'s it',
      '3 last ones',
      'Still here?',
      'Long time no see',
      'Again you?',
      'Thank you for vibing with AutoPost'
    ];

    const sneakLimits = [5, 5, 5, 3, 5, 5, 5, 5]; // posts per round

    function getCurrentLimit() {
      let total = 0;
      for (let i = 0; i <= sneakRound && i < sneakLimits.length; i++) {
        total += sneakLimits[i];
      }
      return total;
    }

    let _lastBadgeText = '';
    function updateBadge() {
      const badge = document.getElementById('postsBadge');
      if (localStorage.getItem('ap_subscribed') === 'true') {
        badge.textContent = 'Pro';
        badge.className = 'posts-badge';
        badge.style.display = 'block';
        badge.style.color = '#5cb88a';
        return;
      }
      badge.style.color = '';
      const limit = getCurrentLimit();
      const remaining = Math.max(0, limit - postsUsed);
      const newText = `${remaining} free left`;
      badge.className = 'posts-badge' + (remaining <= 2 ? ' warning' : '');
      badge.style.display = 'block';

      if (_lastBadgeText && _lastBadgeText !== newText) {
        // Animate: roll out old, roll in new
        badge.innerHTML = `<span class="badge-num roll-out">${_lastBadgeText}</span>`;
        setTimeout(() => {
          badge.innerHTML = `<span class="badge-num roll-in">${newText}</span>`;
        }, 250);
      } else {
        badge.textContent = newText;
      }
      _lastBadgeText = newText;
      badge.classList.remove('pulse');
      void badge.offsetWidth;
      badge.classList.add('pulse');
    }

    function checkPaywall() {
      if (localStorage.getItem('ap_subscribed') === 'true') return false;
      const limit = getCurrentLimit();
      if (postsUsed >= limit) {
        const paywall = document.getElementById('paywall');
        const sneakBtn = document.getElementById('sneakBtn');

        // Reset animation by removing and re-adding active class
        paywall.classList.remove('active');
        void paywall.offsetWidth;
        paywall.classList.add('active');

        // Show sneak button if not on final round
        const nextRound = sneakRound + 1;
        if (nextRound < sneakMessages.length) {
          sneakBtn.textContent = sneakMessages[nextRound];
          sneakBtn.style.display = 'inline-block';
        } else {
          // Final paywall — no more sneaks
          sneakBtn.style.display = 'none';
        }
        return true;
      }
      return false;
    }

    function handleSneak() {
      sneakRound++;
      localStorage.setItem('ap_sneak_round', sneakRound);
      document.getElementById('paywall').classList.remove('active');
      updateBadge();
    }

    function handleSubscribe() {
      window.location.href = 'https://buy.stripe.com/test_aFa00kdq61cugTb60D4Ja01';
    }

    function generate() {
      haptic(2);
      if (checkPaywall()) return;
      const btn = document.getElementById('generateBtn');
      btn.classList.add('loading');
      btn.innerHTML = '<span class="spinner"></span> Generating';
      setTimeout(() => {
        const posts = pickThreePosts();
        renderPosts(posts);
        btn.classList.remove('loading');
        btn.textContent = 'Generate';
      }, 200);
    }

    updateBadge();

    function renderPosts(posts) {
      document.body.classList.add('has-posts');
      const container = document.getElementById('postsContainer');

      // Exit animation for old cards
      const oldCards = container.querySelectorAll('.post-card');
      if (oldCards.length > 0) {
        oldCards.forEach((card, i) => {
          card.style.transition = `opacity 0.3s cubic-bezier(0.4,0,1,1) ${i * 0.04}s, transform 0.3s cubic-bezier(0.4,0,1,1) ${i * 0.04}s`;
          card.style.opacity = '0';
          card.style.transform = 'scale(0.96)';
        });
        setTimeout(() => buildCards(container, posts), 320);
      } else {
        buildCards(container, posts);
      }
    }

    function buildCards(container, posts) {
      container.innerHTML = '';
      posts.forEach((text, idx) => {
        const card = document.createElement('div');
        card.className = 'post-card';
        card.innerHTML = `
          <div class="post-text">${escapeHtml(text)}</div>
          <div class="post-footer">
            <span class="char-count">${text.length}/280</span>
            <div class="post-actions">
              <button class="btn-schedule"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
              <button class="btn-edit">Edit & Post</button>
              <button class="btn-post">Post Now</button>
            </div>
          </div>`;
        container.appendChild(card);

        // Trigger enter animation
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            card.classList.add('enter');
          });
        });

        card.querySelector('.btn-post').onclick = (e) => { e.stopPropagation(); postToX(text, card, true); };
        card.querySelector('.btn-edit').onclick = (e) => { e.stopPropagation(); postToX(text, card, false); };
        card.querySelector('.btn-schedule').onclick = (e) => { e.stopPropagation(); openScheduleSheet(text); };
      });
    }

    function postToX(text, card, directPost) {
      if (card.classList.contains('posted')) return;
      haptic(3);
      const encoded = encodeURIComponent(text);
      if (directPost) {
        window.location.href = `twitter://post?message=${encoded}`;
        setTimeout(() => window.open(`https://x.com/intent/post?text=${encoded}`, '_blank'), 1500);
      } else {
        window.open(`https://x.com/intent/post?text=${encoded}`, '_blank');
      }
      card.classList.add('posted');
      postsUsed++;
      localStorage.setItem('ap_posts_used', postsUsed);
      updateBadge();
      showStatus(directPost ? 'Opening X app...' : 'Opened on X', directPost ? 'success' : 'info');
    }

    function haptic(ms) { if (navigator.vibrate) navigator.vibrate(ms || 1); }

    const _escDiv = document.createElement('div');
    function escapeHtml(text) { _escDiv.textContent = text; return _escDiv.innerHTML; }

    let _statusTimer = 0;
    function showStatus(message, type) {
      clearTimeout(_statusTimer);
      const bar = document.getElementById('statusBar');
      bar.textContent = message; bar.className = `status-bar ${type} show`;
      _statusTimer = setTimeout(() => bar.classList.remove('show'), 3000);
    }

    // Handle return from Stripe checkout
    (function handleSubscriptionReturn() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('subscribed') === 'true') {
        // Unlock: reset all limits
        postsUsed = 0;
        sneakRound = 0;
        localStorage.setItem('ap_posts_used', '0');
        localStorage.setItem('ap_sneak_round', '0');
        localStorage.setItem('ap_subscribed', 'true');
        history.replaceState({}, '', window.location.pathname);
        document.getElementById('paywall').classList.remove('active');
        updateBadge();
        showStatus('Subscription activated!', 'success');
      }
      // If previously subscribed, keep unlocked
      if (localStorage.getItem('ap_subscribed') === 'true') {
        document.getElementById('postsBadge').textContent = 'Pro';
        document.getElementById('postsBadge').className = 'posts-badge';
        document.getElementById('postsBadge').style.display = 'block';
        document.getElementById('postsBadge').style.color = '#5cb88a';
      }
    })();

    // ---- Scheduling ----
    let scheduledPosts = JSON.parse(localStorage.getItem('ap_scheduled') || '[]');
    let _scheduleText = '';
    let _selectedDay = null;
    let _selectedTime = null;

    function openScheduleSheet(text) {
      _scheduleText = text;
      _selectedDay = null;
      _selectedTime = null;
      buildDayPills();
      buildTimeGrid();
      document.getElementById('customTime').value = '';
      document.getElementById('scheduleConfirm').classList.remove('ready');
      document.getElementById('scheduleConfirm').textContent = 'Schedule';
      document.getElementById('sheetOverlay').classList.add('active');
      document.getElementById('scheduleSheet').classList.add('active');
      // Request notification permission early
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }

    function closeScheduleSheet() {
      document.getElementById('sheetOverlay').classList.remove('active');
      document.getElementById('scheduleSheet').classList.remove('active');
    }

    function buildDayPills() {
      const container = document.getElementById('dayPills');
      container.innerHTML = '';
      const now = new Date();
      const labels = ['Today', 'Tomorrow'];
      for (let i = 0; i < 5; i++) {
        const d = new Date(now);
        d.setDate(d.getDate() + i);
        const pill = document.createElement('button');
        pill.className = 'day-pill';
        const label = i < 2 ? labels[i] : d.toLocaleDateString('en-US', { weekday: 'short' });
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        pill.innerHTML = `<span class="day-label">${label}</span><span class="day-date">${dateStr}</span>`;
        pill.onclick = () => selectDay(i, pill);
        container.appendChild(pill);
      }
    }

    function selectDay(dayOffset, pill) {
      document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      _selectedDay = dayOffset;
      buildTimeGrid();
      updateConfirmBtn();
    }

    function buildTimeGrid() {
      const grid = document.getElementById('timeGrid');
      grid.innerHTML = '';
      const now = new Date();
      const slots = [9, 12, 15, 18, 20, 21, 22, 23];
      const slotLabels = ['9 AM', '12 PM', '3 PM', '6 PM', '8 PM', '9 PM', '10 PM', '11 PM'];
      slots.forEach((hour, i) => {
        const btn = document.createElement('button');
        btn.className = 'time-slot';
        btn.textContent = slotLabels[i];
        // Mark past times for today
        if (_selectedDay === 0 && hour <= now.getHours()) {
          btn.classList.add('past');
        }
        btn.onclick = () => selectTimeSlot(hour, 0, btn);
        grid.appendChild(btn);
      });
    }

    function selectTimeSlot(hour, min, btn) {
      document.querySelectorAll('.time-slot').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      _selectedTime = { hour, min };
      document.getElementById('customTime').value = '';
      updateConfirmBtn();
    }

    function selectCustomTime() {
      const val = document.getElementById('customTime').value;
      if (!val) return;
      const [h, m] = val.split(':').map(Number);
      document.querySelectorAll('.time-slot').forEach(b => b.classList.remove('selected'));
      _selectedTime = { hour: h, min: m };
      updateConfirmBtn();
    }

    function updateConfirmBtn() {
      const btn = document.getElementById('scheduleConfirm');
      if (_selectedDay !== null && _selectedTime !== null) {
        btn.classList.add('ready');
        const d = getScheduleDate();
        const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        const dayStr = _selectedDay === 0 ? 'Today' : _selectedDay === 1 ? 'Tomorrow' : d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        btn.textContent = `Schedule for ${dayStr} at ${timeStr}`;
      } else {
        btn.classList.remove('ready');
        btn.textContent = 'Schedule';
      }
    }

    function getScheduleDate() {
      const d = new Date();
      d.setDate(d.getDate() + (_selectedDay || 0));
      d.setHours(_selectedTime.hour, _selectedTime.min, 0, 0);
      return d;
    }

    function confirmSchedule() {
      if (_selectedDay === null || _selectedTime === null) return;
      haptic(3);
      const scheduleDate = getScheduleDate();
      if (scheduleDate <= new Date()) {
        showStatus('Pick a future time', 'info');
        return;
      }
      const item = {
        id: Date.now(),
        text: _scheduleText,
        time: scheduleDate.getTime()
      };
      scheduledPosts.push(item);
      scheduledPosts.sort((a, b) => a.time - b.time);
      localStorage.setItem('ap_scheduled', JSON.stringify(scheduledPosts));
      closeScheduleSheet();
      renderQueue();
      showStatus('Scheduled', 'success');
      // Count as post used
      postsUsed++;
      localStorage.setItem('ap_posts_used', postsUsed);
      updateBadge();
    }

    function cancelScheduled(id) {
      scheduledPosts = scheduledPosts.filter(p => p.id !== id);
      localStorage.setItem('ap_scheduled', JSON.stringify(scheduledPosts));
      renderQueue();
      showStatus('Removed', 'info');
    }

    function postScheduled(id) {
      const item = scheduledPosts.find(p => p.id === id);
      if (!item) return;
      const encoded = encodeURIComponent(item.text);
      window.location.href = `twitter://post?message=${encoded}`;
      setTimeout(() => window.open(`https://x.com/intent/post?text=${encoded}`, '_blank'), 1500);
      scheduledPosts = scheduledPosts.filter(p => p.id !== id);
      localStorage.setItem('ap_scheduled', JSON.stringify(scheduledPosts));
      renderQueue();
      showStatus('Opening X app...', 'success');
    }

    function renderQueue() {
      const section = document.getElementById('queueSection');
      const list = document.getElementById('queueList');
      const count = document.getElementById('queueCount');
      // Clean expired (more than 1 hour past due)
      const now = Date.now();
      scheduledPosts = scheduledPosts.filter(p => p.time > now - 3600000);
      localStorage.setItem('ap_scheduled', JSON.stringify(scheduledPosts));

      if (scheduledPosts.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      count.textContent = scheduledPosts.length;
      list.innerHTML = '';
      scheduledPosts.forEach(item => {
        const d = new Date(item.time);
        const isDue = d.getTime() <= Date.now();
        const today = new Date();
        const isToday = d.toDateString() === today.toDateString();
        const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
        const isTomorrow = d.toDateString() === tomorrow.toDateString();
        const dayLabel = isToday ? 'Today' : isTomorrow ? 'Tomorrow' : d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const timeLabel = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

        const el = document.createElement('div');
        el.className = 'queue-item' + (isDue ? ' due' : '');
        el.innerHTML = `
          <div class="queue-item-top">
            <div class="queue-time${isDue ? ' due' : ''}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${isDue ? 'Ready now' : dayLabel + ' · ' + timeLabel}
            </div>
            <div class="queue-actions">
              <button class="queue-btn queue-btn-cancel" onclick="cancelScheduled(${item.id})">✕</button>
              <button class="queue-btn queue-btn-post" onclick="postScheduled(${item.id})">${isDue ? 'Post Now' : 'Post Early'}</button>
            </div>
          </div>
          <div class="queue-text">${escapeHtml(item.text)}</div>`;
        list.appendChild(el);
      });
    }

    function toggleQueue() {
      const header = document.getElementById('queueHeader');
      const list = document.getElementById('queueList');
      header.classList.toggle('open');
      list.classList.toggle('open');
    }

    // Check for due posts every 30s
    function checkDuePosts() {
      const now = Date.now();
      scheduledPosts.forEach(item => {
        if (item.time <= now && !item._notified) {
          item._notified = true;
          if ('Notification' in window && Notification.permission === 'granted') {
            new Notification('AutoPost', {
              body: 'Time to post! Tap to open.',
              icon: 'icon-192.png',
              tag: 'ap-' + item.id
            });
          }
        }
      });
      renderQueue();
    }

    // Init queue
    renderQueue();
    // Auto-open queue if items exist
    if (scheduledPosts.length > 0) {
      document.getElementById('queueHeader').classList.add('open');
      document.getElementById('queueList').classList.add('open');
    }
    setInterval(checkDuePosts, 30000);

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
